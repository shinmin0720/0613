<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Todo App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app" class="container">
    <!-- 인증 화면 -->
    <div id="auth-section" class="card">
      <h2 id="auth-title">로그인</h2>
      <form id="auth-form">
        <input type="email" id="email" placeholder="이메일" required>
        <input type="password" id="password" placeholder="비밀번호" required>
        <button type="submit" id="auth-btn">로그인</button>
      </form>
      <p id="auth-toggle">계정이 없으신가요? <span id="toggle-btn">회원가입</span></p>
    </div>

    <!-- 할 일 관리 화면 (로그인 후 표시) -->
    <div id="todo-section" class="card hidden">
      <div class="header">
        <h2>내 할 일</h2>
        <button id="logout-btn" class="logout">로그아웃</button>
      </div>
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." required>
        <button type="submit">추가</button>
      </form>
      <ul id="todo-list"></ul>
    </div>
  </div>

  <!-- Firebase SDK 로드 -->
  <script type="module" src="script.js"></script>
</body>
</html>
